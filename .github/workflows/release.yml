name: Release

# master에 푸시될 때 동작.
# - 미반영된 changeset이 있으면: "Version Packages" PR을 자동 생성/갱신.
# - "Version Packages" PR이 머지되어 changeset이 모두 소진된 상태로 푸시되면: npm publish 실행.
on:
  push:
    branches:
      - master

# 동시에 여러 release job이 돌지 않도록 직렬화.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # release commit, tag 생성용
      pull-requests: write # Version PR 생성/갱신용
      id-token: write # npm provenance(추후 옵션) 대비
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # changesets가 git history를 봐야 하므로 전체 fetch.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # changesets/action의 publish 단계에서도 build를 돌리지만,
        # version PR 단계에서 미리 빌드 가능 여부를 검증해 둔다.
        run: pnpm build

      # 인증 토큰을 npm이 실제 읽는 npmrc 파일에 직접 write.
      #
      # actions/setup-node가 NPM_CONFIG_USERCONFIG env를 $RUNNER_TEMP/.npmrc로
      # 설정해 두기 때문에 npm은 ~/.npmrc가 아니라 그 파일을 읽는다.
      # 따라서 우리도 그 경로에 토큰을 써야 한다.
      #
      # GitHub Actions가 로그에서 secret 값을 자동 마스킹하므로 노출 위험 없음.
      - name: Configure npm authentication
        run: |
          NPMRC_PATH="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          echo "Writing auth to: $NPMRC_PATH"
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > "$NPMRC_PATH"
          echo "registry=https://registry.npmjs.org/" >> "$NPMRC_PATH"
          echo "always-auth=true" >> "$NPMRC_PATH"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 디버그: npm이 실제로 어느 npmrc를 읽고 인증되는지 검증.
      - name: Debug npm authentication
        run: |
          NPMRC_PATH="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          echo "NPM_CONFIG_USERCONFIG=$NPM_CONFIG_USERCONFIG"
          echo "Resolved npmrc path: $NPMRC_PATH"
          echo ""
          echo "Contents (token redacted):"
          sed 's/_authToken=.*/_authToken=<REDACTED>/' "$NPMRC_PATH"
          echo ""
          echo "npm whoami:"
          npm whoami || echo "whoami failed"

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
